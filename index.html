    rel="stylesheet">
  <style>
    :root {
      color-scheme: light;
      /* Brand Colors */
      --brand-sky: #0ea5e9;
      --brand-slate: #0f172a;
      --brand-ice: #e2f3ff;
      --brand-sand: #fff3e8;

      /* Premium Gradients */
      --gradient-primary: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      --gradient-sunset: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
      --gradient-ocean: linear-gradient(135deg, #0ea5e9 0%, #0284c7 100%);
      --gradient-aurora: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
      --gradient-hero: linear-gradient(180deg, #0f0c29 0%, #302b63 50%, #24243e 100%);

      /* Glassmorphism */
      --glass-bg: rgba(255, 255, 255, 0.1);
      --glass-border: rgba(255, 255, 255, 0.2);
      --glass-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
      
      /* Custom Properties */
      --font-sans: 'Outfit', sans-serif;
      --font-display: 'Syne', sans-serif;
      --font-grotesk: 'Space Grotesk', sans-serif;
      
      /* Animation Timing */
      --ease-smooth: cubic-bezier(0.4, 0, 0.2, 1);
      --ease-bounce: cubic-bezier(0.68, -0.55, 0.265, 1.55);
      --ease-spring: cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      font-family: 'Outfit', sans-serif;
      background: linear-gradient(180deg, #f0f9ff 0%, #e0f2fe 100%);
      overflow-x: hidden;
      color: var(--brand-slate);
      text-rendering: optimizeLegibility;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* Custom scrollbar */
    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }

    ::-webkit-scrollbar-track {
      background: #f1f5f9;
    }

    ::-webkit-scrollbar-thumb {
      background: linear-gradient(180deg, #0ea5e9, #8b5cf6);
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: linear-gradient(180deg, #0284c7, #7c3aed);
    }

    /* Firefox scrollbar */
    * {
      scrollbar-width: thin;
      scrollbar-color: #0ea5e9 #f1f5f9;
    }

    img,
    svg {
      display: block;
      max-width: 100%;
      height: auto;
    }

    a,
    button {
      transition: all 300ms cubic-bezier(0.4, 0, 0.2, 1);
    }

    ::selection {
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
    }

    /* Glassmorphism Card */
    .glass-card {
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.8);
      box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.15);
    }

    /* Premium Glass Effect */
    .glass-premium {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px) saturate(180%);
      -webkit-backdrop-filter: blur(10px) saturate(180%);
      border: 1px solid rgba(255, 255, 255, 0.2);
      box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
    }

    /* Gradient Text */
    .gradient-text {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* Animated gradient border */
    .gradient-border {
      position: relative;
    }

    .gradient-border::before {
      content: '';
      position: absolute;
      inset: -2px;
      background: linear-gradient(135deg, #0ea5e9, #8b5cf6, #f472b6, #0ea5e9);
      background-size: 300% 300%;
      animation: gradient-border-anim 3s ease infinite;
      border-radius: inherit;
      z-index: -1;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .gradient-border:hover::before {
      opacity: 1;
    }

    @keyframes gradient-border-anim {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* Floating Animation */
    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-20px); }
    }

    /* Shimmer Effect */
    @keyframes shimmer {
      0% { background-position: -1000px 0; }
      100% { background-position: 1000px 0; }
    }

    /* Pulse Glow */
    @keyframes pulse-glow {
      0%, 100% { box-shadow: 0 0 20px rgba(102, 126, 234, 0.4); }
      50% { box-shadow: 0 0 40px rgba(102, 126, 234, 0.8); }
    }

    /* Gradient Animation */
    @keyframes gradient-shift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* Slide In */
    @keyframes slideInUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Scale In */
    @keyframes scaleIn {
      from { opacity: 0; transform: scale(0.9); }
      to { opacity: 1; transform: scale(1); }
    }

    /* Text Reveal Animation */
    @keyframes text-reveal {
      from { transform: translateY(100%); }
      to { transform: translateY(0); }
    }

    .animate-text-reveal {
      animation: text-reveal 0.5s ease forwards;
    }

    /* Fade In */
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .animate-fade-in {
      animation: fadeIn 0.3s ease forwards;
    }

    /* Spin */
    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    /* Bounce */
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    /* Wave Animation */
    @keyframes wave {
      0%, 100% { transform: translateX(0); }
      50% { transform: translateX(25%); }
    }

    /* Blobs Animation */
    @keyframes blob {
      0% { transform: translate(0px, 0px) scale(1); }
      33% { transform: translate(30px, -50px) scale(1.1); }
      66% { transform: translate(-20px, 20px) scale(0.9); }
      100% { transform: translate(0px, 0px) scale(1); }
    }

    .animate-blob {
      animation: blob 7s infinite;
    }

    /* Utility Classes */
    .animate-float {
      animation: float 6s ease-in-out infinite;
    }

    .animate-shimmer {
      animation: shimmer 2s infinite;
    }

    .animate-pulse-glow {
      animation: pulse-glow 2s ease-in-out infinite;
    }

    .animate-gradient {
      background-size: 200% 200%;
      animation: gradient-shift 3s ease infinite;
    }

    /* Hover Effects */
    .hover-lift {
      transition: transform 300ms ease, box-shadow 300ms ease;
    }

    .hover-lift:hover {
      transform: translateY(-8px);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15);
    }

    .hover-glow:hover {
      box-shadow: 0 0 30px rgba(102, 126, 234, 0.6);
    }

    /* Perspective */
    .perspective-text {
      perspective: 1000px;
    }

    /* 3D Transforms */
    .preserve-3d {
      transform-style: preserve-3d;
    }

    .perspective-1000 {
      perspective: 1000px;
    }

    /* Backface Visibility */
    .backface-hidden {
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
    }

    /* Reflection */
    .reflect {
      -webkit-box-reflect: below 0px linear-gradient(to bottom, rgba(0,0,0,0), rgba(0,0,0,0.3));
    }

    /* Blend Modes */
    .blend-multiply {
      mix-blend-mode: multiply;
    }

    .blend-screen {
      mix-blend-mode: screen;
    }

    .blend-overlay {
      mix-blend-mode: overlay;
    }

    /* Mask */
    .mask-gradient {
      -webkit-mask-image: linear-gradient(to bottom, black 50%, transparent 100%);
      mask-image: linear-gradient(to bottom, black 50%, transparent 100%);
    }

    /* Clip Path */
    .clip-path-mountain {
      clip-path: polygon(0% 100%, 20% 30%, 40% 60%, 60% 20%, 80% 50%, 100% 100%);
    }

    .clip-path-circle {
      clip-path: circle(50% at 50% 50%);
    }

    .clip-path-hexagon {
      clip-path: polygon(25% 0%, 75% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%);
    }

    /* Focus Styles */
    *:focus-visible {
      outline: 2px solid #0ea5e9;
      outline-offset: 2px;
    }

    /* Reduced Motion */
    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }

    /* Dark Mode Support (Future) */
    @media (prefers-color-scheme: dark) {
      /* Dark mode styles would go here */
    }

    /* Mobile Optimizations */
    @media (max-width: 480px) {
      body {
        font-size: 15px;
      }

      .glass-card {
        border-radius: 1.5rem;
      }
    }

    /* Tablet */
    @media (min-width: 768px) and (max-width: 1023px) {
      .glass-card {
        border-radius: 2rem;
      }
    }

    /* Large Desktop */
    @media (min-width: 1280px) {
      .container {
        max-width: 1400px;
      }
    }

    /* Print Styles */
    @media print {
      body {
        background: white;
      }
      
      nav, 
      footer, 
      .no-print {
        display: none !important;
      }
    }
  </style>
