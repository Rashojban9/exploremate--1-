<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ExploreMate — 25 Wireframes</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-dark: #0f172a;
      --bg-card: #1e293b;
      --bg-card-alt: #334155;
      --border: #475569;
      --text-primary: #f1f5f9;
      --text-secondary: #94a3b8;
      --text-muted: #64748b;
      --accent: #38bdf8;
      --accent-2: #818cf8;
      --accent-3: #a78bfa;
      --success: #34d399;
      --warning: #fbbf24;
      --danger: #f87171;
      --pink: #f472b6;
      --orange: #fb923c;
      --wire-bg: #f8fafc;
      --wire-border: #cbd5e1;
      --wire-text: #334155;
      --wire-placeholder: #94a3b8;
      --wire-accent: #3b82f6;
      --wire-light: #e2e8f0;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg-dark);
      color: var(--text-primary);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── Hero Header ── */
    .hero {
      padding: 60px 20px 40px;
      text-align: center;
      background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #0f172a 100%);
      position: relative;
      overflow: hidden;
    }
    .hero::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle at 30% 50%, rgba(56, 189, 248, 0.08) 0%, transparent 50%),
                  radial-gradient(circle at 70% 50%, rgba(129, 140, 248, 0.08) 0%, transparent 50%);
      animation: heroFloat 20s ease-in-out infinite;
    }
    @keyframes heroFloat {
      0%, 100% { transform: translate(0, 0); }
      50% { transform: translate(-2%, 2%); }
    }
    .hero h1 {
      font-size: 3rem;
      font-weight: 900;
      background: linear-gradient(135deg, var(--accent), var(--accent-2), var(--accent-3));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 12px;
      position: relative;
      letter-spacing: -1px;
    }
    .hero p {
      font-size: 1.15rem;
      color: var(--text-secondary);
      max-width: 600px;
      margin: 0 auto 24px;
      position: relative;
    }
    .hero .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 20px;
      background: rgba(56, 189, 248, 0.1);
      border: 1px solid rgba(56, 189, 248, 0.2);
      border-radius: 50px;
      color: var(--accent);
      font-weight: 600;
      font-size: 0.85rem;
      position: relative;
    }

    /* ── Navigation ── */
    .nav-bar {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(15, 23, 42, 0.85);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(71, 85, 105, 0.3);
      padding: 0 20px;
    }
    .nav-inner {
      max-width: 1400px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      gap: 8px;
      overflow-x: auto;
      padding: 12px 0;
      scrollbar-width: none;
    }
    .nav-inner::-webkit-scrollbar { display: none; }
    .nav-btn {
      flex-shrink: 0;
      padding: 8px 16px;
      border: 1px solid transparent;
      border-radius: 10px;
      background: transparent;
      color: var(--text-secondary);
      font-family: inherit;
      font-size: 0.8rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.25s;
      white-space: nowrap;
    }
    .nav-btn:hover {
      background: rgba(56, 189, 248, 0.08);
      color: var(--accent);
      border-color: rgba(56, 189, 248, 0.15);
    }
    .nav-btn.active {
      background: rgba(56, 189, 248, 0.12);
      color: var(--accent);
      border-color: rgba(56, 189, 248, 0.3);
      font-weight: 600;
    }
    .nav-num {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 20px;
      height: 20px;
      border-radius: 6px;
      background: rgba(56, 189, 248, 0.15);
      color: var(--accent);
      font-size: 0.65rem;
      font-weight: 700;
      margin-right: 6px;
    }

    /* ── Grid ── */
    .grid-container {
      max-width: 1600px;
      margin: 0 auto;
      padding: 40px 20px 80px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(480px, 1fr));
      gap: 32px;
    }
    @media (max-width: 560px) {
      .grid-container {
        grid-template-columns: 1fr;
      }
    }

    /* ── Wireframe Card ── */
    .wf-card {
      background: var(--bg-card);
      border-radius: 20px;
      overflow: hidden;
      border: 1px solid rgba(71, 85, 105, 0.3);
      transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      animation: cardIn 0.6s ease-out both;
    }
    .wf-card:hover {
      transform: translateY(-4px);
      border-color: rgba(56, 189, 248, 0.3);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3), 0 0 40px rgba(56, 189, 248, 0.05);
    }
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .wf-header {
      padding: 16px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid rgba(71, 85, 105, 0.2);
    }
    .wf-header-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .wf-number {
      width: 32px;
      height: 32px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: 0.8rem;
      color: white;
    }
    .wf-title {
      font-weight: 700;
      font-size: 0.95rem;
      color: var(--text-primary);
    }
    .wf-category {
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .cat-public { background: rgba(56, 189, 248, 0.12); color: var(--accent); }
    .cat-auth { background: rgba(129, 140, 248, 0.12); color: var(--accent-2); }
    .cat-core { background: rgba(52, 211, 153, 0.12); color: var(--success); }
    .cat-feature { background: rgba(251, 191, 36, 0.12); color: var(--warning); }
    .cat-admin { background: rgba(248, 113, 113, 0.12); color: var(--danger); }
    .cat-info { background: rgba(244, 114, 182, 0.12); color: var(--pink); }
    .cat-social { background: rgba(251, 146, 60, 0.12); color: var(--orange); }

    /* ── Wireframe Canvas ── */
    .wf-canvas {
      background: var(--wire-bg);
      margin: 12px;
      border-radius: 12px;
      height: 340px;
      overflow: hidden;
      position: relative;
      border: 1px solid var(--wire-border);
    }

    /* ── Wireframe Elements ── */
    .wf-topbar {
      height: 36px;
      background: #fff;
      border-bottom: 1.5px solid var(--wire-border);
      display: flex;
      align-items: center;
      padding: 0 12px;
      gap: 8px;
    }
    .wf-logo {
      width: 22px;
      height: 22px;
      border-radius: 6px;
      background: var(--wire-accent);
    }
    .wf-nav-links {
      display: flex;
      gap: 12px;
      margin-left: auto;
    }
    .wf-nav-link {
      width: 36px;
      height: 6px;
      background: var(--wire-light);
      border-radius: 3px;
    }
    .wf-btn-sm {
      padding: 4px 12px;
      border-radius: 5px;
      font-size: 0.55rem;
      font-weight: 600;
      border: none;
      color: #fff;
      background: var(--wire-accent);
    }
    .wf-btn-outline {
      padding: 4px 12px;
      border-radius: 5px;
      font-size: 0.55rem;
      font-weight: 600;
      border: 1.5px solid var(--wire-accent);
      color: var(--wire-accent);
      background: transparent;
    }

    .wf-section { padding: 10px 14px; }
    .wf-heading {
      font-size: 0.7rem;
      font-weight: 700;
      color: var(--wire-text);
      margin-bottom: 6px;
    }
    .wf-subheading {
      font-size: 0.55rem;
      color: var(--wire-placeholder);
      margin-bottom: 8px;
    }
    .wf-line {
      height: 5px;
      background: var(--wire-light);
      border-radius: 3px;
      margin-bottom: 4px;
    }
    .wf-line-short { width: 60%; }
    .wf-line-medium { width: 80%; }
    .wf-line-xs { width: 40%; }
    .wf-line-dark {
      background: #cbd5e1;
    }

    .wf-card-inner {
      background: #fff;
      border: 1.5px solid var(--wire-border);
      border-radius: 8px;
      padding: 8px 10px;
      margin-bottom: 6px;
    }
    .wf-input {
      height: 24px;
      background: #f1f5f9;
      border: 1.5px solid var(--wire-border);
      border-radius: 6px;
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      padding: 0 8px;
      font-size: 0.5rem;
      color: var(--wire-placeholder);
    }
    .wf-input-icon {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--wire-border);
      margin-right: 6px;
      flex-shrink: 0;
    }
    .wf-avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--wire-accent), #818cf8);
      flex-shrink: 0;
    }
    .wf-avatar-sm {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: linear-gradient(135deg, #e2e8f0, #cbd5e1);
      flex-shrink: 0;
    }
    .wf-img-placeholder {
      background: linear-gradient(135deg, #e2e8f0 0%, #f1f5f9 50%, #e2e8f0 100%);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--wire-placeholder);
      font-size: 0.6rem;
      font-weight: 600;
    }
    .wf-icon-box {
      width: 28px;
      height: 28px;
      border-radius: 8px;
      background: rgba(59, 130, 246, 0.1);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.7rem;
      flex-shrink: 0;
    }
    .wf-stat {
      text-align: center;
    }
    .wf-stat-num {
      font-size: 0.9rem;
      font-weight: 800;
      color: var(--wire-accent);
    }
    .wf-stat-label {
      font-size: 0.45rem;
      color: var(--wire-placeholder);
      font-weight: 500;
    }
    .wf-sidebar {
      width: 60px;
      background: #fff;
      border-right: 1.5px solid var(--wire-border);
      padding: 8px 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }
    .wf-sidebar-icon {
      width: 24px;
      height: 24px;
      border-radius: 7px;
      background: #f1f5f9;
    }
    .wf-sidebar-icon.active {
      background: rgba(59, 130, 246, 0.15);
      border: 1.5px solid rgba(59, 130, 246, 0.3);
    }
    .wf-badge {
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 0.45rem;
      font-weight: 700;
      background: rgba(52, 211, 153, 0.15);
      color: #059669;
    }
    .wf-tag {
      padding: 3px 8px;
      border-radius: 4px;
      font-size: 0.45rem;
      font-weight: 600;
      background: #f1f5f9;
      color: var(--wire-text);
      border: 1px solid var(--wire-border);
    }
    .wf-map {
      background: linear-gradient(135deg, #dbeafe, #e0f2fe, #ede9fe);
      border-radius: 8px;
      position: relative;
      overflow: hidden;
    }
    .wf-map::after {
      content: '';
      position: absolute;
      inset: 0;
      background:
        linear-gradient(0deg, rgba(203,213,225,0.3) 1px, transparent 1px),
        linear-gradient(90deg, rgba(203,213,225,0.3) 1px, transparent 1px);
      background-size: 20px 20px;
    }
    .wf-map-pin {
      width: 10px;
      height: 14px;
      background: #ef4444;
      border-radius: 50% 50% 50% 0;
      transform: rotate(-45deg);
      position: absolute;
      z-index: 1;
    }
    .wf-map-route {
      position: absolute;
      border: 2px dashed var(--wire-accent);
      border-radius: 50%;
      z-index: 1;
    }
    .wf-divider {
      height: 1px;
      background: var(--wire-border);
      margin: 6px 0;
    }
    .wf-progress {
      height: 6px;
      background: #e2e8f0;
      border-radius: 3px;
      overflow: hidden;
    }
    .wf-progress-bar {
      height: 100%;
      background: linear-gradient(90deg, var(--wire-accent), #818cf8);
      border-radius: 3px;
    }
    .wf-chat-bubble {
      padding: 6px 10px;
      border-radius: 10px 10px 10px 2px;
      background: #f1f5f9;
      font-size: 0.45rem;
      color: var(--wire-text);
      max-width: 70%;
      margin-bottom: 4px;
    }
    .wf-chat-bubble.sent {
      background: var(--wire-accent);
      color: white;
      border-radius: 10px 10px 2px 10px;
      margin-left: auto;
    }
    .wf-tab {
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 0.5rem;
      font-weight: 600;
      color: var(--wire-placeholder);
      background: transparent;
    }
    .wf-tab.active {
      background: var(--wire-accent);
      color: white;
    }
    .wf-qr {
      width: 50px;
      height: 50px;
      background: repeating-conic-gradient(var(--wire-text) 0% 25%, white 0% 50%) 0 0 / 10px 10px;
      border-radius: 4px;
    }
    .wf-toggle {
      width: 28px;
      height: 14px;
      border-radius: 7px;
      background: var(--wire-accent);
      position: relative;
    }
    .wf-toggle::after {
      content: '';
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: white;
      position: absolute;
      right: 2px;
      top: 2px;
    }
    .wf-table-row {
      display: flex;
      align-items: center;
      padding: 4px 0;
      gap: 8px;
      border-bottom: 1px solid #f1f5f9;
      font-size: 0.45rem;
      color: var(--wire-text);
    }
    .wf-stars {
      color: #fbbf24;
      font-size: 0.5rem;
      letter-spacing: 1px;
    }
    .wf-footer {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 28px;
      background: #fff;
      border-top: 1.5px solid var(--wire-border);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
      padding: 0 12px;
    }
    .wf-footer-link {
      width: 30px;
      height: 4px;
      background: var(--wire-light);
      border-radius: 2px;
    }

    /* Flex utilities */
    .flex { display: flex; }
    .flex-col { flex-direction: column; }
    .items-center { align-items: center; }
    .items-start { align-items: flex-start; }
    .justify-between { justify-content: space-between; }
    .justify-center { justify-content: center; }
    .gap-2 { gap: 2px; }
    .gap-4 { gap: 4px; }
    .gap-6 { gap: 6px; }
    .gap-8 { gap: 8px; }
    .gap-10 { gap: 10px; }
    .gap-12 { gap: 12px; }
    .flex-1 { flex: 1; }
    .w-full { width: 100%; }
    .text-center { text-align: center; }
    .ml-auto { margin-left: auto; }
    .overflow-hidden { overflow: hidden; }
    .relative { position: relative; }

    /* ── Description Footer ── */
    .wf-desc {
      padding: 14px 20px 18px;
      border-top: 1px solid rgba(71, 85, 105, 0.15);
    }
    .wf-desc p {
      font-size: 0.78rem;
      color: var(--text-secondary);
      line-height: 1.5;
    }

    /* ── Bottom Footer ── */
    .page-footer {
      text-align: center;
      padding: 40px 20px;
      border-top: 1px solid rgba(71, 85, 105, 0.2);
      color: var(--text-muted);
      font-size: 0.85rem;
    }
  </style>
</head>
<body>

  <!-- ═══ Hero ═══ -->
  <div class="hero">
    <div class="badge">✈️ ExploreMate Wireframe Suite</div>
    <h1 style="margin-top: 20px;">25 Wireframes</h1>
    <p>Complete UI wireframe collection for the ExploreMate travel platform — covering every screen from landing to admin dashboard.</p>
  </div>

  <!-- ═══ Sticky Nav ═══ -->
  <div class="nav-bar">
    <div class="nav-inner" id="navInner"></div>
  </div>

  <!-- ═══ Wireframe Grid ═══ -->
  <div class="grid-container" id="wireframeGrid"></div>

  <!-- ═══ Footer ═══ -->
  <div class="page-footer">
    <p>ExploreMate © 2026 — 25 Wireframes &middot; Built with ❤️</p>
  </div>

  <script>
    // ── Wireframe Data ──
    const wireframes = [
      {
        id: 1,
        title: "Splash Screen",
        category: "public",
        catLabel: "Public",
        color: "#38bdf8",
        desc: "Animated intro with brand logo, plane animation along a curved path, and a circular progress indicator.",
        render: (c) => {
          c.innerHTML = `
            <div style="height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(135deg,#0f172a,#1e1b4b);">
              <svg width="80" height="40" viewBox="0 0 200 60" style="margin-bottom:12px;">
                <path d="M 10,50 C 60,50 80,10 140,10 S 190,30 200,20" fill="none" stroke="rgba(56,189,248,0.5)" stroke-width="2" stroke-dasharray="5,5"/>
                <circle cx="140" cy="10" r="5" fill="#38bdf8"/>
              </svg>
              <div style="display:flex;gap:3px;margin-bottom:16px;">
                ${Array.from('ExploreMate').map(c=>`<span style="color:white;font-weight:800;font-size:1rem;">${c}</span>`).join('')}
              </div>
              <svg width="32" height="32" style="transform:rotate(-90deg);">
                <circle cx="16" cy="16" r="12" stroke="rgba(255,255,255,0.1)" stroke-width="3" fill="none"/>
                <circle cx="16" cy="16" r="12" stroke="#38bdf8" stroke-width="3" fill="none" stroke-dasharray="50 75" stroke-linecap="round"/>
              </svg>
            </div>`;
        }
      },
      {
        id: 2,
        title: "Landing Page",
        category: "public",
        catLabel: "Public",
        color: "#38bdf8",
        desc: "Hero section with CTA, feature highlights, destination cards, and footer navigation.",
        render: (c) => {
          c.innerHTML = `
            <div class="wf-topbar">
              <div class="wf-logo"></div>
              <div class="wf-nav-links"><div class="wf-nav-link"></div><div class="wf-nav-link"></div><div class="wf-nav-link"></div><div class="wf-nav-link"></div></div>
              <div class="wf-btn-sm">Sign Up</div>
            </div>
            <div style="padding:16px 14px;text-align:center;">
              <div class="wf-heading" style="font-size:0.85rem;margin-bottom:4px;">Discover Nepal Like Never Before</div>
              <div class="wf-subheading">AI-powered travel companion for unforgettable adventures</div>
              <div style="display:flex;gap:6px;justify-content:center;margin:10px 0;">
                <div class="wf-btn-sm">Get Started</div>
                <div class="wf-btn-outline">Learn More</div>
              </div>
            </div>
            <div style="display:flex;gap:6px;padding:0 14px;margin-bottom:10px;">
              <div class="wf-img-placeholder" style="flex:1;height:70px;">🏔️ Everest</div>
              <div class="wf-img-placeholder" style="flex:1;height:70px;">🛕 Temples</div>
              <div class="wf-img-placeholder" style="flex:1;height:70px;">🌿 Pokhara</div>
            </div>
            <div style="display:flex;gap:10px;justify-content:center;padding:0 14px;">
              <div class="wf-stat"><div class="wf-stat-num">50+</div><div class="wf-stat-label">Destinations</div></div>
              <div class="wf-stat"><div class="wf-stat-num">10K+</div><div class="wf-stat-label">Users</div></div>
              <div class="wf-stat"><div class="wf-stat-num">4.9</div><div class="wf-stat-label">Rating</div></div>
            </div>
            <div class="wf-footer"><div class="wf-footer-link"></div><div class="wf-footer-link"></div><div class="wf-footer-link"></div><div class="wf-footer-link"></div></div>`;
        }
      },
      {
        id: 3,
        title: "Login Page",
        category: "auth",
        catLabel: "Auth",
        color: "#818cf8",
        desc: "Email and password fields, social login options, remember me toggle, and forgot password link.",
        render: (c) => {
          c.innerHTML = `
            <div style="display:flex;height:100%;">
              <div class="wf-img-placeholder" style="width:45%;height:100%;border-radius:0;">🌄</div>
              <div style="flex:1;padding:20px 16px;display:flex;flex-direction:column;justify-content:center;">
                <div class="wf-heading" style="font-size:0.85rem;">Welcome Back</div>
                <div class="wf-subheading" style="margin-bottom:12px;">Sign in to continue exploring</div>
                <div class="wf-input"><div class="wf-input-icon"></div>Email address</div>
                <div class="wf-input"><div class="wf-input-icon"></div>Password</div>
                <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
                  <div style="display:flex;align-items:center;gap:4px;"><div class="wf-toggle" style="width:20px;height:10px;"></div><span style="font-size:0.4rem;color:#94a3b8;">Remember me</span></div>
                  <span style="font-size:0.4rem;color:#3b82f6;">Forgot password?</span>

    // ── Category helpers ──

      public: 'cat-public',
      auth: 'cat-auth',
      core: 'cat-core',
      feature: 'cat-feature',
      admin: 'cat-admin',
      info: 'cat-info',
      social: 'cat-social'
    };

    // ── Build Navigation ──
    const navInner = document.getElementById('navInner');
    wireframes.forEach(wf => {
      const btn = document.createElement('button');
      btn.className = 'nav-btn';
      btn.id = `nav-${wf.id}`;
      btn.innerHTML = `<span class="nav-num">${wf.id}</span>${wf.title}`;
      btn.onclick = () => {
        document.getElementById(`wf-${wf.id}`).scrollIntoView({ behavior: 'smooth', block: 'center' });
      };
      navInner.appendChild(btn);
    });

    // ── Build Wireframe Grid ──
    const grid = document.getElementById('wireframeGrid');
    wireframes.forEach((wf, index) => {
      const card = document.createElement('div');
      card.className = 'wf-card';
      card.id = `wf-${wf.id}`;
      card.style.animationDelay = `${index * 0.05}s`;

      const header = document.createElement('div');
      header.className = 'wf-header';
      header.innerHTML = `
        <div class="wf-header-left">
          <div class="wf-number" style="background:${wf.color};">${wf.id}</div>
          <div class="wf-title">${wf.title}</div>
        </div>
        <div class="wf-category ${catMap[wf.category]}">${wf.catLabel}</div>
      `;

      const canvas = document.createElement('div');
      canvas.className = 'wf-canvas';
      wf.render(canvas);

      const desc = document.createElement('div');
      desc.className = 'wf-desc';
      desc.innerHTML = `<p>${wf.desc}</p>`;

      card.appendChild(header);
      card.appendChild(canvas);
      card.appendChild(desc);
      grid.appendChild(card);
    });

    // ── Intersection Observer for nav highlight ──
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        const id = entry.target.id.replace('wf-', '');
        const navBtn = document.getElementById(`nav-${id}`);
        if (navBtn) {
          navBtn.classList.toggle('active', entry.isIntersecting);
        }
      });
    }, { threshold: 0.3 });

    document.querySelectorAll('.wf-card').forEach(card => observer.observe(card));
  </script>
